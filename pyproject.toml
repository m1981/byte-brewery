# /pyproject.toml (Root)

[project]
name = "byte-brewery"
version = "1.0.0"
description = "Scripts crafted like fine, magical ales for AI development"
requires-python = ">=3.10"
# Notice: No production dependencies here! They go to the individual packages.

[tool.uv.workspace]
members = ["packages/*"]

# Modern uv way to handle development/testing dependencies globally
[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "pytest-watch>=4.2.0",
]

# Global pytest configuration
[tool.pytest.ini_options]
addopts = "-v"