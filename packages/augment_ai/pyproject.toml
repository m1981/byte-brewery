[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "augment-ai"
version = "1.0.0"
requires-python = ">=3.10"
dependencies = [
    "anthropic>=0.75.0",
    "google-genai>=1.56.0",
    "pydantic>=2.12.5",
    "pyyaml>=6.0.3",
]

[project.scripts]
aug = "augment_ai.aug_pipeline:main"
aug-recap = "augment_ai.recap:main"
dce = "augment_ai.dce:main"
pext = "augment_ai.pext:main"

[tool.pytest.ini_options]
testpaths = ["tests"]