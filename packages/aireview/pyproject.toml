[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aireview"
version = "1.0.0"
requires-python = ">=3.10"
dependencies = [
    "openai>=2.14.0",
    "python-dotenv>=1.2.1",
    # Add any other specific dependencies aireview needs
]

[project.scripts]
aireview = "aireview.main:main"

[tool.pytest.ini_options]
testpaths = ["tests"]