[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "prompt-extractor"
version = "1.0.0"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.12.5",
]

[project.scripts]
chatmap = "prompt_extractor.cli:main"

[tool.hatchling.build.targets.wheel]
packages = ["src/prompt_extractor"]

[tool.pytest.ini_options]
testpaths = ["tests"]
