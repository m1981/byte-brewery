[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "prompt-extractor"
version = "1.0.0"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.12.5", # Assuming it uses pydantic based on your global list
]

[project.scripts]
chatmap = "prompt_extractor.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]