[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "brewery-utils"
version = "1.0.0"
requires-python = ">=3.10"
dependencies = [] # Add dependencies if dce.py or pext.py need them

[project.scripts]
dce = "utils.dce:main"
pext = "utils.pext:main"
repo-map = "utils.repo_map:main"

[tool.pytest.ini_options]
testpaths = ["tests"]