[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "byte-utils"
version = "1.0.0"
requires-python = ">=3.10"
dependencies = [
    "pathspec>=0.12",
    "pycallgraph2>=1.1.3",
    "setuptools",          # pycallgraph2 uses distutils via setuptools
]

[project.optional-dependencies]
# Optional: erdantic for Pydantic model ER diagrams
erdantic = ["erdantic>=0.6"]
# Optional: pylint for pyreverse-based class diagrams
pyreverse = ["pylint>=3.0"]

[project.scripts]
dce         = "utils.dce:main"
pext        = "utils.pext:main"
pysum       = "utils.pysum:main"
repo-map    = "utils.repo_map:main"
gen-diagram = "utils.gen_diagram:main"
lsproj      = "utils.lsproj:main"
callgraph   = "utils.callgraph:main"
py-diagram  = "utils.py_diagram:main"

# Distribution name is "byte-utils" but the importable package is still "utils".
# Hatchling needs an explicit pointer because the two names differ.
[tool.hatch.build.targets.wheel]
packages = ["src/utils"]

[tool.pytest.ini_options]
testpaths = ["tests"]
